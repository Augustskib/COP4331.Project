<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ContactVault — Create Account</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="LogIn.styles.css" />
</head>

<body>

<!-- ----------------------------------------------------------
     PAGE WRAPPER — centered white card
----------------------------------------------------------- -->
<div class="page-wrap">

  <!-- --------------------------------------------------------
       FORM PANEL — header + register form
  --------------------------------------------------------- -->
  <div class="form-panel">

    <!-- Header text -->
    <div class="header-text">
      <h2 class="header-title">Create Account</h2>
      <p class="header-subtitle">Create an account to continue</p>
    </div>

    <!-- ------------------------------------------------------
         REGISTER FORM
    ------------------------------------------------------- -->
    <div class="form-pane active">

      <!-- Alert area -->
      <div class="alert" id="register-alert"></div>

      <!-- Email field -->
      <div class="field">
        <label for="reg-email">Email Address</label>
        <input type="text" id="reg-email" placeholder="e.g. rick@email.com" autocomplete="email" />
      </div>

      <!-- Username field -->
      <div class="field">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="e.g. RickL" autocomplete="username" />
      </div>

      <!-- Password field -->
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="At least 8 characters" autocomplete="new-password" />
      </div>

      <!-- Terms & Conditions checkbox -->
      <div class="remember-row">
        <input type="checkbox" id="agree-terms" class="remember-checkbox" />
        <label for="agree-terms" class="remember-label">I agree to the Terms & Conditions</label>
      </div>

      <!-- Create Account button -->
      <button class="submit-btn" id="register-btn" onclick="doRegister()">Create Account</button>

      <!-- Bottom link -->
      <p class="form-subtitle bottom-link">
        Already have an account?
        <a href="index.html" class="link-create">Sign In</a>
      </p>

    </div>

  </div>
</div>

<!-- JS files -->
<script src="auth.js"></script>

</body>
</html>
