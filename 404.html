<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ContactVault — Page Not Found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="404.css" />
</head>

<body>

<div class="page-wrap">

  <div class="form-panel">

    <!-- ILLUSTRATION -->
    <div class="error-illustration">
      <div class="error-window">

        <div class="error-topbar">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <div class="address-bar"></div>
        </div>

        <div class="error-body">
          <div class="error-404">404</div>

          <div class="cylinders">
            <div class="cylinder"></div>
            <div class="cylinder"></div>
          </div>

          <div class="side-dots">
            <span></span><span></span><span></span>
          </div>
        </div>

      </div>
    </div>

    <div class="header-text">
      <h2 class="header-title">Page Not Found</h2>
      <p class="header-subtitle">Looks like you've got lost...</p>
    </div>

    <button class="submit-btn" onclick="window.location.href='index.html'">
      Go Back Home
    </button>

  </div>

</div>

</body>
</html>
