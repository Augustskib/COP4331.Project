<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <div class="app-container">

        <!-------------------
            Navigation
        --------------------->
        <aside class="sidebar">
            <div class="brand-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users-round-icon lucide-users-round"><path d="M18 21a8 8 0 0 0-16 0"/><circle cx="10" cy="8" r="5"/><path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/></svg>
                <h1>Contact Manager</h1>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#dashboard">Dashboard</a></li>
                    <li><a href="#favorites">Favorites</a></li>
                    <li><a href="#add-contact">Add Contact</a></li>
                    <li><a href="#settings">Settings</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="#logout" class="logout-link">Logout</a>
            </div>
        </aside>

        <div class="workspace">
            <!-------------------------------
                        Header
            -------------------------------->
            <header class="top-header">
                <div class="search-container">
                    <form action="/search" method="GET">
                        <input type="search" id="contact-search" name="q" placeholder="Search contacts...">
                        <button type="submit">Search</button>
                    </form>
                </div>

                <div class="user-controls">
       
                    <div class="user-profile">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-round-icon lucide-circle-user-round"><path d="M17.925 20.056a6 6 0 0 0-11.851.001"/><circle cx="12" cy="11" r="4"/><circle cx="12" cy="12" r="10"/></svg>                        <div class="user-info">
                            <span class="user-name">Jaden</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-------------------
                Your Contacts
            --------------------->
            <main class="main-content">

                <section class="contacts-widget">
    
                    <header class="widget-header">
                        <h2>Your Contacts</h2>
                        <span class="contact-count-label">12 contacts</span>
                    </header>

                    <div class="empty-state-card" id="empty-state">
    
                        <div class="empty-state-icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-contact-icon lucide-contact"><path d="M16 2v2"/><path d="M7 22v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><path d="M8 2v2"/><circle cx="12" cy="11" r="3"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
                        </div>

                        <h3 class="empty-state-title">No contacts yet</h3>
                        <p class="empty-state-description">You haven't added any contacts yet.</p>

                        <button class="primary-btn add-contact-btn" id="add-first-contact-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="plus-icon">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add your first contact
                        </button>

                    </div>

                    <!-- <ul class="contact-list">
                        
                        <li class="contact-card">
                            <img src="" alt="John Doe" class="contact-avatar">
                            
                            <div class="contact-info">
                                <h3 class="contact-name">John Doe</h3>
                                <p class="contact-detail">+1 (555) 123-4567</p>
                            </div>
                            
                            <div class="contact-actions">
                                <button class="action-btn call-btn" aria-label="Call John Doe">📞</button>
                                <button class="action-btn email-btn" aria-label="Email John Doe">✉️</button>
                                <button class="action-btn options-btn" aria-label="More options">⋮</button>
                            </div>
                        </li>
                    </ul> -->

                    <!-- <footer class="widget-footer">
                        <button id="load-more-btn">
                            Load more 
                            <span class="chevron-down">⌄</span>
                        </button>
                    </footer> -->

                </section>

            </main>
        </div>
    </div>

</body>
</html>
