<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Contact Manager</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <main>
        <section>
            <h1>Login to Account</h1>
            <p>Please enter your email and password to continue</p>
            <form action="" method="post" aria-label="Login">

                <!-- Input for email -->
                <label for="email">Email Address:</label>
                <input type="email" id="email" placeholder="example@gmail.com" name="email" autocomplete="email" required>

                <!-- Input for password -->
                <div class="password-header">
                    <label for="password">Password</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <input type="password" id="password" name="password" autocomplete="current-password" required>

                <!-- Checkbox for remember password -->
                <input type="checkbox" id="remember-password" name="remember-password">
                <label for="remember-password">Remember Password</label>

                <button type="submit">Sign In</button>

                <p>Don't have an account? <a href="#">Create Account</a></p>
            </form>
        </section>
    </main>
    
</body>
</html>
